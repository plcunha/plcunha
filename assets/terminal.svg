<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Animated developer terminal</title>
  <desc id="desc">A terminal introducing João Vitor as a backend, API, and AI automation developer.</desc>

  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#a371f7;#39d353;#58a6ff" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#8957e5">
        <animate attributeName="stop-color" values="#8957e5;#1f6feb;#58a6ff;#8957e5" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .line { opacity: 0; animation: reveal 9s ease-in-out infinite; }
    .line-1 { animation-delay: 0.2s; }
    .line-2 { animation-delay: 1.1s; }
    .line-3 { animation-delay: 2s; }
    .line-4 { animation-delay: 2.9s; }
    .cursor { animation: blink 0.8s steps(1) infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    @keyframes reveal {
      0%, 8% { opacity: 0; transform: translateY(5px); }
      14%, 82% { opacity: 1; transform: translateY(0); }
      92%, 100% { opacity: 0; }
    }
    @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .line, .cursor, .pulse { animation: none; opacity: 1; }
    }
  </style>

  <rect x="7" y="7" width="746" height="286" rx="20" fill="url(#frame)" opacity="0.95" filter="url(#glow)" />
  <rect x="10" y="10" width="740" height="280" rx="17" fill="#0d1117" />
  <rect x="10" y="10" width="740" height="46" rx="17" fill="#161b22" />
  <rect x="10" y="40" width="740" height="16" fill="#161b22" />

  <circle cx="38" cy="33" r="7" fill="#ff5f56" />
  <circle cx="62" cy="33" r="7" fill="#ffbd2e" />
  <circle cx="86" cy="33" r="7" fill="#27c93f" />
  <text x="380" y="39" text-anchor="middle" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">joao@github: ~/building</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21">
    <g class="line line-1">
      <text x="38" y="96" fill="#39d353">$</text>
      <text x="62" y="96" fill="#c9d1d9">whoami</text>
      <text x="178" y="96" fill="#58a6ff">João Vitor Cunha</text>
    </g>
    <g class="line line-2">
      <text x="38" y="142" fill="#39d353">$</text>
      <text x="62" y="142" fill="#c9d1d9">focus</text>
      <text x="148" y="142" fill="#d2a8ff">Backend · APIs · AI Agents</text>
    </g>
    <g class="line line-3">
      <text x="38" y="188" fill="#39d353">$</text>
      <text x="62" y="188" fill="#c9d1d9">mode</text>
      <text x="136" y="188" fill="#ffa657">Build · Automate · Improve</text>
    </g>
    <g class="line line-4">
      <text x="38" y="234" fill="#39d353">$</text>
      <text x="62" y="234" fill="#c9d1d9">status</text>
      <text x="154" y="234" fill="#7ee787">Ready to ship</text>
      <rect class="cursor" x="318" y="216" width="12" height="22" rx="2" fill="#58a6ff" />
    </g>
  </g>

  <circle class="pulse" cx="714" cy="258" r="8" fill="#39d353" />
  <text x="694" y="264" text-anchor="end" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">online</text>
</svg>
