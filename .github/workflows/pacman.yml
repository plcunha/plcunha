name: Generate pacman animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: pacman-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Generate light and dark contribution graphs
        run: |
          mkdir -p dist
          npx --yes pacman-contribution-graph@5.3.1 \
            --game pacman \
            --platform github \
            --username "${GITHUB_REPOSITORY_OWNER}" \
            --gameTheme github \
            --output dist/pacman-contribution-graph.svg
          npx --yes pacman-contribution-graph@5.3.1 \
            --game pacman \
            --platform github \
            --username "${GITHUB_REPOSITORY_OWNER}" \
            --gameTheme github-dark \
            --output dist/pacman-contribution-graph-dark.svg
          test -s dist/pacman-contribution-graph.svg
          test -s dist/pacman-contribution-graph-dark.svg

      - name: Publish contribution graphs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b output
          git add pacman-contribution-graph.svg pacman-contribution-graph-dark.svg
          git commit -m "chore: update contribution graphs"
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            output
